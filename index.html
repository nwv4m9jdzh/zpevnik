<!DOCTYPE html>
<html lang="cs" id="top">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pivka a buřty</title>
<link rel="icon" type="image/png" sizes="180x180" href="apple-touch-icon.png">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-title" content="Pivka a buřty">
<style>
  :root {
    --bg:           #16120d;   
    --surface:      #201b15;  
    --border:       #40372a;   
    --accent:       #d3c5a9;  
    --accent-dim:   #d3c5a9;   
    --text:         #bfb9ad;   /* běžný text — ztlumený, ať první slova vyniknou */
    --text-zvyraz:  #f5f3ef;   /* první slovo řádku — lehce "svítí" */
    --text-dim:     #d3c5a9;
    --ztlumene:     #7a705f;   /* čísla písní a interpret — přesně mezi #d3c5a9 a pozadím obsahu #201b15 */
    --chord-bg:     #241d12;   
    --chord-color:  #be9a6a;   
    --chord-border: #483823;   
    /* stejný volný okraj nahoře a dole jako u pruhu s názvem skladby:
       text 1.1rem + 1.2rem volného místa (u skladby 1.2rem + 1.2rem = 2.4rem) */
    --header-h:     max(2.3rem, 52px);
    --titul-h:      max(2.4rem, 46px);  /* výška přilepeného pruhu s názvem skladby */
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* 16px × 1.6 = výchozí zvětšení o 60 %; tlačítka a/A to mění za běhu */
  html { font-size: 26px; scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 1rem;
    line-height: 1.5;
    max-width: 640px;
    margin: 0 auto;
  }

  header {
    background: var(--bg);
    border-bottom: 2px solid var(--border);
    padding: 8px 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    height: var(--header-h);
    display: flex;
    align-items: center;
    gap: 10px;
  }
  header h1 {
    font-size: 1.1rem;
    color: var(--accent);
    font-weight: normal;
    letter-spacing: 0.04em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  /* plynulé prolnutí při výměně názvu zpěvníku */
  #nazev-zpevniku { transition: opacity 1.2s ease; }

  .nastroje {
    margin-left: auto;
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }
  /* společný vzhled tlačítek v hlavičce stránky i u transpozice */
  .nastroje button,
  .nastroje a,
  .transpozice button {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--accent);
    font-family: inherit;
    text-decoration: none;
    width: 38px;
    height: 38px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 0.8rem;
    line-height: 1;
  }
  .nastroje .mensi { font-size: 0.6rem; }

  nav.obsah {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 18px;
  }
  nav.obsah h2 {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    margin-bottom: 10px;
  }
  nav.obsah ol {
    list-style: none;
    counter-reset: song;
  }
  nav.obsah li {
    counter-increment: song;
    padding: 3px 0;
  }
  /* číslování v seznamu — stejný styl i odsazení jako v řádku názvu skladby:
     číslo, tečka, mezera, název */
  nav.obsah li::before {
    content: counter(song) ".\00a0";
    color: var(--ztlumene);
    font-size: 1.2rem;
    font-weight: normal;
  }
  nav.obsah a {
    color: var(--text);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: color .15s, border-color .15s;
  }
  nav.obsah a:hover,
  nav.obsah a:focus {
    color: var(--accent);
    border-bottom-color: var(--accent-dim);
    outline: none;
  }

  main { padding-bottom: 80px; }

  article.pisen {
    margin-top: 28px;
    scroll-margin-top: var(--header-h);
  }

  /* Pruh s názvem skladby — lepí se hned pod hlavičku stránky */
  .pisen-hlavicka {
    position: sticky;
    top: var(--header-h);
    z-index: 20;
    height: var(--titul-h);
    background: var(--chord-bg);
    border-top: 1px solid var(--chord-border);
    border-bottom: 1px solid var(--chord-border);
    padding: 0 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .pisen-titul {
    flex: 1;
    min-width: 0;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .pisen-cislo {
    font-size: 1.2rem;
    font-weight: normal;
    color: var(--ztlumene);
  }
  .pisen-nazev {
    font-size: 1.2rem;
    color: var(--accent);
    font-weight: bold;
  }
  .pisen-interpret {
    font-size: 1.2rem;
    font-weight: normal;
    color: var(--ztlumene);
  }
  .pisen-interpret::before { content: "— "; }

  /* Tlačítka transpozice (doplňuje skript do každé hlavičky) */
  .transpozice {
    display: flex;
    gap: 6px;
    flex-shrink: 0;
  }

  .blok { position: relative; }

  /* odskok před každým dalším řádkem akordů (ne mezi názvem skladby
     a prvním řádkem akordů) — cca polovina výšky řádku textu */
  .blok + .blok { margin-top: 0.75rem; }

  /* Pruh s akordy — lepí se pod pruh s názvem skladby.
     Akordy jsou ve zdroji oddělené JEDNOU mezerou; word-spacing k ní
     přidává rozestup (1ch ≈ celkem dvě mezery) — uprav podle chuti.
     Dlouhý řádek akordů se v mezerách normálně zalomí. */
  .akordy {
    word-spacing: 1ch;
    position: sticky;
    top: calc(var(--header-h) + var(--titul-h));
    z-index: 10;
    background: var(--bg);
    border-top: 1px solid var(--chord-border);
    border-bottom: 1px solid var(--chord-border);
    padding: 5px 20px;
    font-size: 1rem;
    font-weight: bold;
    color: var(--chord-color);
  }

  .blok-text {
    padding: 8px 20px 20px;
    font-size: 1rem;
  }

  /* Každý řádek textu zvlášť: zalomené pokračování řádku má menší
     svislý odskok (line-height) než nový řádek (margin-top navíc)
     a je předsazené, takže je na první pohled poznat. */
  .radek {
    line-height: 1.3;
    margin-top: 0.65em;
    padding-left: 1.2em;
    text-indent: -1.2em;
  }
  .radek:first-child { margin-top: 0; }
  .mezera { height: 1em; }

  /* První slovo každého řádku (doplňuje skript) */
  .prvni-slovo { color: var(--text-zvyraz); }
</style>
</head>
<body>

<header>
  <h1>🪵🔥🏔️ <span id="nazev-zpevniku">Pivka a buřty</span></h1>
  <div class="nastroje">
    <button class="mensi" id="pismo-mensi" title="Zmenšit písmo" aria-label="Zmenšit písmo">a</button>
    <button id="pismo-vetsi" title="Zvětšit písmo" aria-label="Zvětšit písmo">A</button>
    <a href="#top" title="Na začátek — seznam písní" aria-label="Na začátek stránky">☰</a>
  </div>
</header>

<!-- zde v h2 byl OBSAH -->
<nav class="obsah">
  <h2></h2>
  <ol id="seznam-pisni"></ol>
</nav>

<!-- Písně se načítají skriptem níže: napřed pisne.js (skutečný zpěvník,
     kvůli autorským právům není v repu ani viditelný při ladění — viz .claudeignore),
     a teprve když chybí, vezmou se ukázkové písně z demo_pisne.js. -->
<main id="pisne"></main>

<script>
// ===== Nastavení =====
var TRANSPOZICE_KROK = 7;    // půltóny na jeden stisk ↓♭/↑♯ (případně změň na 1 nebo 2)
var PAMATOVAT_PISMO = false; // true = pamatovat zvolenou velikost písma i po obnovení stránky

// Název zpěvníku se při načtení vybere náhodně a pak se co 10 minut plynule vymění.
var NAZEV_INTERVAL = 10 * 60 * 1000;
var NAZVY_ZPEVNIKU = [
  'Pivka a buřty',
  'Blábol č. M',
  'Pojďme si zazpívat!',
  'Olympic hadra',
  'Kéžby Urdel',
  'Barréčko musíš!',
  'Stánky a jiné písně',
  'Nečekej úsměv od želvy, co měls rád.',
  'Eva Hodila Granát Do Atomové Elektrárny.',
  'Já, písnička 9000',
  'Songy k ohňu',
  'Pomsta Dalibora Jandy',
  'Džexna zahraj!',
  'Nějakou naši, có?',
  'Udavač z Těšína',
  'Kabáti jsou nejlepší'
];

// ===== Transpozice akordů (česká notace: H = půltón pod C, B se bere jako H) =====
var NOTY = ['C', 'C#', 'D', 'D#', 'E', 'F', 'F#', 'G', 'G#', 'A', 'A#', 'H'];
var HODNOTA = { 'C': 0, 'C#': 1, 'D': 2, 'D#': 3, 'E': 4, 'F': 5, 'F#': 6,
                'G': 7, 'G#': 8, 'A': 9, 'A#': 10, 'H': 11, 'B': 11 };

function transponujTon(ton, krok) {
  var m = ton.match(/^([A-H]#?)(.*)$/);
  if (!m || !(m[1] in HODNOTA)) return ton;
  var idx = ((HODNOTA[m[1]] + krok) % 12 + 12) % 12;
  return NOTY[idx] + m[2];
}

function transponujAkord(akord, krok) {
  // bass za lomítkem se transponuje taky
  return akord.split('/').map(function (cast) {
    return transponujTon(cast, krok);
  }).join('/');
}

function transponujRadek(text, krok) {
  // popisek před dvojtečkou (např. "ref.:", "sloka:") nejsou akordy — nechá se být
  var popisek = '';
  var deleni = text.indexOf(':');
  if (deleni !== -1) {
    popisek = text.slice(0, deleni + 1);
    text = text.slice(deleni + 1);
  }
  return popisek + text.split(/(\s+)/).map(function (kus) {
    return /^\s/.test(kus) ? kus : transponujAkord(kus, krok);
  }).join('');
}

function transponujPisen(pisen, krok) {
  pisen.querySelectorAll('.akordy').forEach(function (el) {
    el.textContent = transponujRadek(el.textContent, krok);
  });
}

// ===== Parser písní =====
// Písně jsou v pisne.js jako prostý text:
//   ## Název písně ##
//   && Interpret &&
//   [A D E F#mi]   = řádek akordů
//   text sloky     (prázdný řádek = mezera mezi slokami)
// Každé "## ... ##" začíná novou píseň.
function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function parsujPisne(text) {
  var pisne = [];
  var pisen = null;
  var blok = null;

  text.split(/\r?\n/).forEach(function (radek) {
    var r = radek.trim();
    var m;
    if ((m = r.match(/^##\s*(.*?)\s*##$/))) {
      pisen = { nazev: m[1], interpret: '', bloky: [] };
      pisne.push(pisen);
      blok = null;
      return;
    }
    if (!pisen) return;
    if ((m = r.match(/^&&\s*(.*?)\s*&&$/))) { pisen.interpret = m[1]; return; }
    if ((m = r.match(/^\[(.*)\]$/))) {
      blok = { akordy: m[1].trim().split(/\s+/).join(' '), radky: [] };
      pisen.bloky.push(blok);
      return;
    }
    if (!blok) {
      if (r === '') return;
      blok = { akordy: null, radky: [] };
      pisen.bloky.push(blok);
    }
    blok.radky.push(r);
  });

  // Řazení napřed podle interpreta, pak podle názvu — písně téhož autora
  // jsou pospolu, i když jsou ve zdrojovém souboru přeházené.
  var porovnej = new Intl.Collator('cs').compare;
  pisne.sort(function (a, b) {
    return porovnej(a.interpret, b.interpret) || porovnej(a.nazev, b.nazev);
  });

  var html = '';
  pisne.forEach(function (p) {
    html += '<article class="pisen">\n';
    html += '  <div class="pisen-hlavicka"><div class="pisen-titul">';
    html += '<span class="pisen-cislo"></span> ';
    html += '<span class="pisen-nazev">' + escapeHtml(p.nazev) + '</span>';
    if (p.interpret) {
      html += ' <span class="pisen-interpret">' + escapeHtml(p.interpret) + '</span>';
    }
    html += '</div></div>\n';

    p.bloky.forEach(function (b) {
      var radky = b.radky.slice();
      while (radky.length && radky[0] === '') radky.shift();
      while (radky.length && radky[radky.length - 1] === '') radky.pop();
      if (!radky.length && b.akordy === null) return;

      html += '  <div class="blok">\n';
      if (b.akordy !== null) {
        html += '    <div class="akordy">' + escapeHtml(b.akordy) + '</div>\n';
      }
      html += '    <div class="blok-text">\n';
      radky.forEach(function (r) {
        html += r === ''
          ? '      <div class="mezera"></div>\n'
          : '      <div class="radek">' + escapeHtml(r) + '</div>\n';
      });
      html += '    </div>\n  </div>\n';
    });

    html += '</article>\n';
  });
  return html;
}

// ===== Název zpěvníku =====
// Při načtení se vybere náhodně, pak se co NAZEV_INTERVAL plynule prolne do jiného.
(function () {
  var el = document.getElementById('nazev-zpevniku');
  var aktualni = '';
  function nahodnyNazev() {
    var n;
    do { n = NAZVY_ZPEVNIKU[Math.floor(Math.random() * NAZVY_ZPEVNIKU.length)]; }
    while (n === aktualni && NAZVY_ZPEVNIKU.length > 1);
    return n;
  }
  function nastav(n) { aktualni = n; el.textContent = n; document.title = n; }
  nastav(nahodnyNazev());
  setInterval(function () {
    el.style.opacity = 0;
    setTimeout(function () {
      nastav(nahodnyNazev());
      el.style.opacity = 1;
    }, 1300);   // počká, až doběhne prolnutí (1.2 s v CSS)
  }, NAZEV_INTERVAL);
})();

// ===== Sestavení stránky =====
// Spouští se až po načtení písní (viz nactiPisne na konci); seznam, čísla,
// tlačítka transpozice i zvýraznění prvních slov se doplní automaticky.
function sestavStranku() {
  if (typeof PISNE_TEXT !== 'undefined') {
    document.getElementById('pisne').innerHTML = parsujPisne(PISNE_TEXT);
  }

  var seznam = document.getElementById('seznam-pisni');

  document.querySelectorAll('article.pisen').forEach(function (pisen, i) {
    var n = i + 1;
    pisen.id = 'pisen-' + n;
    var cislo = pisen.querySelector('.pisen-cislo');
    if (cislo) cislo.textContent = n + '.';

    var nazev = pisen.querySelector('.pisen-nazev');
    var li = document.createElement('li');
    var a = document.createElement('a');
    a.href = '#pisen-' + n;
    a.textContent = nazev ? nazev.textContent : 'Píseň ' + n;
    li.appendChild(a);
    seznam.appendChild(li);

    // tlačítka transpozice do hlavičky písně
    var hlavicka = pisen.querySelector('.pisen-hlavicka');
    if (hlavicka) {
      var box = document.createElement('span');
      box.className = 'transpozice';
      [['↓♭', -TRANSPOZICE_KROK, 'Transponovat dolů'],
       ['↑♯',  TRANSPOZICE_KROK, 'Transponovat nahoru']].forEach(function (def) {
        var b = document.createElement('button');
        b.textContent = def[0];
        b.title = def[2];
        b.addEventListener('click', function () { transponujPisen(pisen, def[1]); });
        box.appendChild(b);
      });
      hlavicka.appendChild(box);
    }
  });

  // první slovo každého řádku do zvýrazňovacího spanu;
  // má-li první slovo do tří písmen, svítí i druhé slovo
  document.querySelectorAll('.radek').forEach(function (radek) {
    var text = radek.textContent;
    var slova = text.split(' ');
    var pocet = 1;
    var pismena = slova[0].replace(/[^\p{L}\p{N}]/gu, '');
    if (pismena.length <= 3 && slova.length > 1) pocet = 2;
    var prvni = slova.slice(0, pocet).join(' ');
    var zbytek = text.slice(prvni.length);
    radek.textContent = '';
    var span = document.createElement('span');
    span.className = 'prvni-slovo';
    span.textContent = prvni;
    radek.appendChild(span);
    radek.appendChild(document.createTextNode(zbytek));
  });
}

// ===== Načtení písní =====
// Napřed pisne.js — skutečný zpěvník, který kvůli autorským právům není v repu
// ani viditelný při ladění (.claudeignore). Teprve když neexistuje, načtou se
// ukázkové písně z demo_pisne.js. Oba soubory definují proměnnou PISNE_TEXT.
function nactiPisne(zdroje) {
  if (!zdroje.length) { sestavStranku(); return; }
  var s = document.createElement('script');
  s.src = zdroje[0];
  s.onload = sestavStranku;
  s.onerror = function () {
    document.head.removeChild(s);
    nactiPisne(zdroje.slice(1));
  };
  document.head.appendChild(s);
}
nactiPisne(['pisne.js', 'demo_pisne.js']);

// ===== Zvětšování/zmenšování písma =====
// Mění root font-size, vše je v rem. Výchozí 26px = 16px zvětšených o 60 %.
(function () {
  var KLIC = 'zpevnik-pismo';
  var velikost = 26;
  if (PAMATOVAT_PISMO) {
    velikost = parseInt(localStorage.getItem(KLIC), 10) || 26;
  }
  function nastav() {
    document.documentElement.style.fontSize = velikost + 'px';
    if (PAMATOVAT_PISMO) {
      try { localStorage.setItem(KLIC, velikost); } catch (e) {}
    }
  }
  nastav();
  document.getElementById('pismo-mensi').addEventListener('click', function () {
    velikost = Math.max(14, velikost - 2); nastav();
  });
  document.getElementById('pismo-vetsi').addEventListener('click', function () {
    velikost = Math.min(48, velikost + 2); nastav();
  });
})();
</script>

</body>
</html>
